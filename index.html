<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bases de Typescript</title>
</head>
<body>
    <h1>Se utiliza el comando tsc --init para la obtener el tsconfig.json</h1>
    <h2>Dentro de esta configuración ponemos en false lo siguiente:</h2>
    <ul>
        <li>sourceMap</li>
        <li>declaration</li>
        <li>declarationMap</li>
    </ul>
    <br>
    <h2>Para que no aparezca el object cambiamos lo siguiente:</h2>
    <ul>
        <li>module: esnext</li>
        <li>target: es2016</li>
    </ul>
    <script src="objects/objects.js"></script>
</body>
</html>
